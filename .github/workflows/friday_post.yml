name: 🤖 Friday Azure AI Post Generator

on:
  schedule:
    # Runs every Friday at 4:00 AM UTC (9:30 AM IST)
    - cron: '0 4 * * 5'
  
  workflow_dispatch:
    inputs:
      use_ai_model:
        description: 'Use AI model for generation?'
        type: boolean
        default: false
        required: false
  
  # Allow manual trigger for testing
  push:
    branches:
      - main
    paths:
      - '.github/workflows/friday_post.yml'
      - 'main.py'
      - 'src/**'

env:
  PYTHON_VERSION: '3.11'

jobs:
  generate-post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 📁 Create data directory
        run: mkdir -p data
      
      - name: 🤖 Generate LinkedIn Post
        env:
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
          MODEL_NAME: 'TinyLlama/TinyLlama-1.1B-Chat-v1.0'
        run: |
          if [ "${{ github.event.inputs.use_ai_model }}" = "true" ]; then
            python main.py --model "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
          else
            python main.py --model "template"
          fi
      
      - name: 📤 Upload generated post
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-post-${{ github.run_id }}
          path: |
            data/ready_to_post.txt
            data/post_history.json
            data/latest_news.json
            data/agent_*.log
          retention-days: 30
      
      - name: 💾 Cache post history
        uses: actions/cache@v4
        with:
          path: data/post_history.json
          key: post-history-${{ github.run_id }}
          restore-keys: |
            post-history-
      
      - name: 📊 Display post statistics
        run: |
          if [ -f data/ready_to_post.txt ]; then
            echo "=== POST GENERATED SUCCESSFULLY ==="
            echo "Character count: $(wc -c < data/ready_to_post.txt)"
            echo "First line: $(head -n 1 data/ready_to_post.txt)"
            echo ""
            echo "📋 To publish this post:"
            echo "   1. Download the artifact 'linkedin-post-${{ github.run_id }}'"
            echo "   2. Or run locally: python publish.py"
          else
            echo "❌ Post generation may have failed"
          fi
      
      - name: 📝 Create summary comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let postPreview = 'No post generated';
            
            try {
              postPreview = fs.readFileSync('data/ready_to_post.txt', 'utf8').substring(0, 300);
            } catch(e) {
              console.log('Could not read post file');
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 Friday Post Generated!\n\n`
                + `📅 Date: ${new Date().toISOString().split('T')[0]}\n`
                + `📝 Preview:\n\`\`\`\n${postPreview}...\n\`\`\`\n\n`
                + `### To Publish:\n`
                + `1. Download artifacts from this workflow run\n`
                + `2. Run locally: \`python publish.py\`\n`
                + `3. Or manually copy from \`ready_to_post.txt\`\n\n`
                + `[📤 Post to LinkedIn](https://www.linkedin.com/feed/)`
            });

  notify:
    needs: generate-post
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: 📬 Create notification file
        run: |
          echo "Post generation completed at $(date)" > notification.txt
          echo "Check workflow artifacts for the generated LinkedIn post." >> notification.txt
      
      - name: 📤 Upload notification
        uses: actions/upload-artifact@v4
        with:
          name: notification-${{ github.run_id }}
          path: notification.txt
          retention-days: 7